<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPIS-360: Assignment 1 - Faisal</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body>

    <button id="startButton">Start AR Experience</button>

    <div id="ui-overlay" style="display:none;">
        <h1>Faisal's Geometry Scene</h1>
        <p>Scan the Hiro Marker to see the magic</p>
    </div>

<a-scene
  id="scene"
  embedded
  arjs="sourceType: webcam;"
  vr-mode-ui="enabled: false"
  style="display:none;">

  <a-marker preset="hiro">

    <!-- tect above geometric -->
    <a-text
      value="Faisal's Geometry Scene"
      position="0 2.0 0"
      align="center"
      color="#FFFFFF"
      width="5">
    </a-text>

    <!-- Cube -->
    <a-box 
      position="-1 0.5 0" 
      width="0.5" height="0.5" depth="0.5" 
      material="color: #4CC3D9;" 
      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
    </a-box>
    
<!-- donut base layer -->
  <a-torus 
  position="0 0.5 0"
  rotation="0 360 0"
  radius="0.4"
  radius-tubular="0.12"
  material="color: #F39C12;" 
  animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
</a-torus>

<!-- Chocolate layer -->
<a-torus
  position="0 0.58 0" 
  rotation="0 360 0"
  radius="0.4"
  radius-tubular="0.06"
  material="color: #4B2C20;">
</a-torus>

    <!-- Pyramid -->
    <a-cone 
      position="1 0.5 0" 
      radius-bottom="0.4" height="0.6" segments-radial="4"
      material="color: #FF5733;"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
    </a-cone>

    <!-- carpet layer -->
    <a-plane 
      position="0 0.01 0" 
      rotation="-90 0 0" 
      width="3" 
      height="1.5" 
      material="color: #FFE8E3; opacity: 0.8; transparent: true;">
    </a-plane>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
        // Handle the Start Button for Safari/Chrome compatibility
        document.getElementById("startButton").addEventListener("click", function () {
            const scene = document.getElementById("scene");
            const overlay = document.getElementById("ui-overlay");

            // Show AR elements
            scene.style.display = "block";
            overlay.style.display = "block";
            
            // Hide Start Button
            this.style.display = "none";
  // Important for iOS
  window.dispatchEvent(new Event("resize"));
});
</script>

</body>
</html>
