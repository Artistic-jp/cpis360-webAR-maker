<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Assignment for CPIS-360</title>
    
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar-nft.js"></script>
  </head> 
   <style>
    body { margin:0; overflow:hidden; }

    #startButton {
      position: absolute;
      z-index: 9999;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 25px;
      font-size: 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<button id="startButton">Start AR</button>

<a-scene
  id="scene"
  embedded
  arjs="sourceType: webcam;"
  vr-mode-ui="enabled: false"
  style="display:none;">

  <a-marker preset="hiro">
    <a-torus 
      position="0 0.5 0"
      rotation="90 0 0"
      radius="0.4"
      radius-tubular="0.12"
      material="color: orange;"
      animation="property: rotation; to: 90 360 0; loop: true; dur: 6000">
    </a-torus>

    <a-text
      value="Faisal's AR Donut"
      position="0 1.5 0"
      align="center"
      color="#FFFFFF"
      width="4">
    </a-text>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
document.getElementById("startButton").addEventListener("click", function () {
  const scene = document.getElementById("scene");

  scene.style.display = "block";
  this.style.display = "none";

  // Important for iOS
  window.dispatchEvent(new Event("resize"));
});
</script>

</body>
</html>
