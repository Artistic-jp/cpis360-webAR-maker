<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Assignment for CPIS-360</title>
    
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar-nft.js"></script>
  </head> 
   <style>
    body { margin:0; overflow:hidden; }

    #startButton {
      position: absolute;
      z-index: 9999;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 25px;
      font-size: 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<button id="startButton">Start AR</button>

<a-scene
  id="scene"
  embedded
  arjs="sourceType: webcam;"
  vr-mode-ui="enabled: false"
  style="display:none;">

  <a-marker preset="hiro">

    <a-text
      value="Faisal's Geometry Scene"
      position="0 2.0 0"
      align="center"
      color="#FFFFFF"
      width="5">
    </a-text>

    <a-box 
      position="-1 0.5 0" 
      width="0.5" height="0.5" depth="0.5" 
      material="color: #4CC3D9;" 
      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
    </a-box>

    <a-torus 
  id="donut-base"
  position="0 0.5 0"
  rotation="90 0 0"
  radius="0.4"
  radius-tubular="0.12"
  material="color: #F39C12;" 
  animation="property: rotation; to: 90 360 0; loop: true; dur: 6000; easing: linear">
  
  <a-torus
    position="0 0 0.02" 
    radius="0.4"
    radius-tubular="0.05"
    material="color: #4B2C20;"
    animation="property: rotation; to: 0 0 0; loop: true; dur: 6000">
  </a-torus>
</a-torus>

    <a-cone 
      position="1 0.5 0" 
      radius-bottom="0.4" height="0.6" segments-radial="4"
      material="color: #FF5733;"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
    </a-cone>

    <a-plane 
      position="0 0.01 0" 
      rotation="-90 0 0" 
      width="3" 
      height="1.5" 
      material="color: #FFE8E3; opacity: 0.8; transparent: true;">
    </a-plane>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
document.getElementById("startButton").addEventListener("click", function () {
  const scene = document.getElementById("scene");

  scene.style.display = "block";
  this.style.display = "none";

  // Important for iOS
  window.dispatchEvent(new Event("resize"));
});
</script>

</body>
</html>
