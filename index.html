<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>The First Assignment for CPIS-360</title>
    
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar-nft.js"></script>
  </head> 
  <style>
  .arjs-loader {
    height: 100%;
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
    background-color: rgba(0, 0, 0, 0.8);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .arjs-loader div {
    text-align: center;
    font-size: 1.25em;
    color: white;
  }
</style>

<body style="margin : 0px; overflow: hidden;">
  <!-- minimal loader shown until image descriptors are loaded -->
  <div class="arjs-loader">
    <div>Loading, please wait...</div>
  </div>
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; videoTexture: true;"
      vr-mode-ui="enabled: false">
      
      <a-marker preset="hiro">
        <a-torus 
          position="0 0.5 0" 
          rotation="90 0 0" 
          radius="0.4" 
          radius-tubular="0.12" 
          material="color: #F39C12;" 
          animation="property: rotation; to: 90 360 0; loop: true; dur: 6000"> 
        </a-torus>          
        
        <a-text   
          value="Faisal's AR Donut"   
          position="0 1.5 0"   
          align="center"   
          color="#FFFFFF"   
          width="4"> 
        </a-text> 
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Force Safari to wake up the camera on user click
      document.getElementById('startButton').addEventListener('click', function() {
        const scene = document.querySelector('a-scene');
        if (scene) {
          // Removes the overlay and tells the scene to resize/start
          document.getElementById('ar-instructions').style.display = 'none';
          scene.style.display = 'block';
          window.dispatchEvent(new Event('resize'));
        }
      });
    </script>
  </body>
</html>
