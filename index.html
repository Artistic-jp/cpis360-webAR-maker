
<!DOCTYPE html> 
<html> 
  <head> 
    <meta charset="utf-8"> 
    <title>The First Assignment for CPIS-360</title> 
    <!-- 1. Load ar.js --> 
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe
ar.js"></script>
    
  </head> 
  <body style="margin: 0; overflow: hidden;"> 
    <!-- 3. Create the Scene --> 
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
  <!-- 4. Define the Marker --> 
      <a-marker preset="hiro"> 
  <a-torus  
    position="0 0.5 0" 
    rotation="90 0 0" 
    radius="0.4" 
    radius-tubular="0.12" 
    material="color: #F39C12;" 
    animation="property: rotation; to: 90 360 0; loop: true; dur: 6000"> 
  </a-torus>          
  
  <a-text   
    value="Hello WebAR!"   
    position="0 1.5 0"   
    align="center"   
    color="#FFFFFF"   
    width="4"> 
  </a-text> 
</a-marker>
 
      <!-- 6. Add the Camera --> 
      <a-entity camera></a-entity>       
    </a-scene> 
  </body> 
</html>
