<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>The First Assignment for CPIS-360</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head> <body style="margin: 0; overflow: hidden;">
    <div id="ar-instructions" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 999; background: white; padding: 20px; border-radius: 10px; font-family: Arial; text-align: center; box-shadow: 0 0 10px rgba(0,0,0,0.5);">
      <p style="margin-bottom: 15px;">1. Point camera at Hiro Marker</p>
      <button id="startButton" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Start AR Experience</button>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; videoTexture: true;"
      vr-mode-ui="enabled: false">
      
      <a-marker preset="hiro">
        <a-torus 
          position="0 0.5 0" 
          rotation="90 0 0" 
          radius="0.4" 
          radius-tubular="0.12" 
          material="color: #F39C12;" 
          animation="property: rotation; to: 90 360 0; loop: true; dur: 6000"> 
        </a-torus>          
        
        <a-text   
          value="Faisal's AR Donut"   
          position="0 1.5 0"   
          align="center"   
          color="#FFFFFF"   
          width="4"> 
        </a-text> 
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Force Safari to wake up the camera on user click
      document.getElementById('startButton').addEventListener('click', function() {
        const scene = document.querySelector('a-scene');
        if (scene) {
          // Removes the overlay and tells the scene to resize/start
          document.getElementById('ar-instructions').style.display = 'none';
          scene.style.display = 'block';
          window.dispatchEvent(new Event('resize'));
        }
      });
    </script>
  </body>
</html>
